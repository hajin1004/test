<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY 6:4 BOX</title>
    <style>
        body { background: #000 url('https://raw.githubusercontent.com/hajin1004/abc/main/bg.png') no-repeat center center; background-size: cover; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; position: relative; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 0; }
        .container { text-align: center; padding: 20px; width: 100%; max-width: 400px; z-index: 1; }
        .lucky-btn { 
            background: linear-gradient(45deg, #f4c20d, #bf953f); 
            color: #000; border: none; padding: 25px 0; width: 100%; 
            font-size: 26px; font-weight: bold; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 0 25px rgba(244, 194, 13, 0.4);
            transition: 0.3s; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        #loading-area { display: none; margin-top: 25px; }
        .loader { border: 4px solid #333; border-top: 4px solid #f4c20d; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .video-overlay { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 100; }
        .video-guard { position: absolute; inset: 0; z-index: 101; background: rgba(0,0,0,0); }
        video { width: 100%; height: 100%; object-fit: contain; }
        .info { margin-top: 35px; color: #888; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="main-content" class="container">
        <h1 style="margin-bottom: 45px; color: #f4c20d; text-shadow: 0 0 10px rgba(244,194,13,0.3);">🎰 LUCKY BOX</h1>
        <button id="main-btn" class="lucky-btn" onclick="startLucky()"> 🎁 OPEN </button>
        
        <div id="loading-area">
            <div class="loader"></div>
            <p style="margin-top:15px; color:#f4c20d; font-weight: bold;">행운의 상자를 확인 중...</p>
        </div>

        <div class="info">
            오늘의 시크릿 행운을 확인하세요!<br>
            <small style="opacity: 0.6;">이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받을 수 있습니다.</small>
        </div>
    </div>

    <div id="video-overlay" class="video-overlay">
        <div class="video-guard"></div>
        <video id="v" playsinline webkit-playsinline disablePictureInPicture controlsList="nodownload"></video>
    </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzX9e1zAJYeh1TLuuiqw-D--eeL6gZcRNW0Kzqf2dXzFxZtqx05dWV6sRkUxqSRxNX6/exec";

function checkLimit() {
    const today = new Date().toDateString();
    const lastDate = localStorage.getItem('lastDate');
    
    if (lastDate !== today) {
        const randomLimit = Math.floor(Math.random() * 4) + 7; 
        localStorage.setItem('lastDate', today);
        localStorage.setItem('dailyLimit', randomLimit);
        localStorage.setItem('clickCount', '0');
    }

    let limit = parseInt(localStorage.getItem('dailyLimit')) || 7;
    let count = parseInt(localStorage.getItem('clickCount')) || 0;

    if (count >= limit) {
        alert("오늘의 모든 상자를 열었습니다! 내일 다시 참여해주세요.");
        const adLinks = [
            "https://link.coupang.com/a/dLXD5X",
            "https://link.coupang.com/a/dN4QKg",
            "https://link.coupang.com/a/dN4R06"
        ];
        window.location.href = adLinks[Math.floor(Math.random() * adLinks.length)];
        return false;
    }

    localStorage.setItem('clickCount', count + 1);
    return true;
}

function startLucky() {
    if (!checkLimit()) return;

    const btn = document.getElementById("main-btn");
    const loading = document.getElementById("loading-area");
    const video = document.getElementById("v");
    const overlay = document.getElementById("video-overlay");

    btn.style.display = "none";
    loading.style.display = "block";

    fetch(GAS_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {
        loading.style.display = "none";
        
        if (data.type === "video") {
            video.src = data.url;
            video.onloadeddata = () => {
                overlay.style.display = "flex";
                video.muted = true;
                video.play().catch(e => console.log("Play failed", e));
                setTimeout(() => { video.muted = false; }, 5000);
            };
            video.onended = stopAndClose;
            video.onerror = () => { alert("로드 실패! 다시 시도합니다."); resetUI(); };
        } else {
            // 수정: 버튼 노출 없이 즉시 현재 창에서 광고 이동
            window.location.href = data.url;
        }
    })
    .catch(() => {
        alert("서버 연결이 지연되고 있습니다.");
        resetUI();
    });
}

function resetUI() {
    const btn = document.getElementById("main-btn");
    btn.style.display = "block";
    btn.innerHTML = "🎁 OPEN";
    btn.style.background = "linear-gradient(45deg, #f4c20d, #bf953f)";
    btn.onclick = startLucky;
    document.getElementById("loading-area").style.display = "none";
}

function stopAndClose() {
    const video = document.getElementById("v");
    video.pause(); 
    video.src = "";
    document.getElementById("video-overlay").style.display = "none";
    resetUI();
}
</script>
</body>
</html>
