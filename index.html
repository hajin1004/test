<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzX9e1zAJYeh1TLuuiqw-D--eeL6gZcRNW0Kzqf2dXzFxZtqx05dWV6sRkUxqSRxNX6/exec";

function checkLimit() {
    const today = new Date().toDateString();
    const lastDate = localStorage.getItem('lastDate');
    if (lastDate !== today) {
        const randomLimit = Math.floor(Math.random() * 4) + 7; 
        localStorage.setItem('lastDate', today);
        localStorage.setItem('dailyLimit', randomLimit);
        localStorage.setItem('clickCount', '0');
    }
    let limit = parseInt(localStorage.getItem('dailyLimit'));
    let count = parseInt(localStorage.getItem('clickCount'));
    if (count >= limit) {
        alert("오늘의 모든 상자를 열었습니다! 내일 다시 참여해주세요.");
        return false;
    }
    localStorage.setItem('clickCount', count + 1);
    return true;
}

function startLucky() {
    if (!checkLimit()) return;

    const btn = document.getElementById("main-btn");
    const loading = document.getElementById("loading-area");
    const video = document.getElementById("v");
    const overlay = document.getElementById("video-overlay");

    btn.style.display = "none";
    loading.style.display = "block";

    fetch(GAS_URL + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {
        loading.style.display = "none";
        
        if (data.type === "video") {
            // [수정] 에러 핸들러를 재생 시점에만 등록
            video.onerror = () => { 
                if(video.src !== "" && video.src !== window.location.href) {
                    alert("영상을 불러오지 못했습니다. 다시 시도합니다."); 
                    resetUI(); 
                }
            };

            video.src = data.url;
            video.onloadeddata = () => {
                overlay.style.display = "flex";
                video.muted = true;
                video.play();
                setTimeout(() => { 
                    document.getElementById("close-btn").style.display = "flex";
                    video.muted = false; 
                }, 5000);
            };
            video.onended = stopAndClose;
        } else {
            // [수정] 광고 당첨 시 버튼 단계 없이 즉시 새 창 열기 시도
            const adWin = window.open(data.url, "_blank");
            
            // 만약 브라우저가 팝업을 차단해서 adWin이 null이라면 버튼 노출
            if (!adWin || adWin.closed || typeof adWin.closed === 'undefined') {
                btn.style.display = "block";
                btn.innerHTML = "🎁 당첨! 행운 확인하기";
                btn.onclick = () => { window.open(data.url, "_blank"); resetUI(); };
            } else {
                // 성공적으로 열렸다면 UI 초기화
                resetUI();
            }
        }
    })
    .catch(() => {
        alert("연결이 지연되고 있습니다.");
        resetUI();
    });
}

function resetUI() {
    const btn = document.getElementById("main-btn");
    btn.style.display = "block";
    btn.innerHTML = "🎁 OPEN";
    btn.onclick = startLucky;
    document.getElementById("loading-area").style.display = "none";
}

function stopAndClose() {
    const video = document.getElementById("v");
    // [핵심] 소스 비우기 전에 에러 핸들러 제거
    video.onerror = null; 
    video.pause(); 
    video.src = "";
    video.load(); // 영상 리소스 해제
    document.getElementById("video-overlay").style.display = "none";
    document.getElementById("close-btn").style.display = "none";
    resetUI();
}
</script>
