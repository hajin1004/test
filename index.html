<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP LUCKY BOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #ffdf00;
            --vip-red: #8b0000;
            --dark-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--dark-bg);
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 배경 효과 */
        .bg-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2a0000 0%, #0a0a0a 100%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 1; width: 100%; max-width: 400px; padding: 20px; }
        
        .title {
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle { font-size: 1rem; color: #ccc; margin-bottom: 40px; }

        /* 선물 상자 디자인 */
        .box-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 50px;
            cursor: pointer;
            perspective: 1000px;
        }

        .box-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--vip-red) 0%, #4a0000 100%);
            border: 4px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .box-lid {
            position: absolute;
            top: -10%; left: -5%; width: 110%; height: 30%;
            background: linear-gradient(135deg, #a00000 0%, var(--vip-red) 100%);
            border: 4px solid var(--gold);
            border-radius: 10px;
            z-index: 2;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box-ribbon-v {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 40px; height: 100%;
            background: linear-gradient(to right, var(--gold-bright), var(--gold), var(--gold-bright));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .vip-badge {
            position: relative;
            background: var(--dark-bg);
            color: var(--gold);
            padding: 10px 15px;
            border: 2px solid var(--gold);
            font-weight: 900;
            font-size: 1.5rem;
            border-radius: 5px;
            z-index: 3;
        }

        /* 버튼 디자인 */
        .open-btn {
            background: linear-gradient(to bottom, var(--gold-bright), var(--gold));
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            transition: all 0.2s;
            width: 80%;
        }

        .open-btn:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }

        /* 결과 오버레이 (영상이 나타나는 곳) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ⚠️ 핵심 수정: video-guard를 제거하거나 숨깁니다 */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%; /* 구글 드라이브 화면이 전체를 차지하게 설정 */
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    
    <div class="container">
        <h1 class="title">VIP BOX</h1>
        <p class="subtitle">PREMIUM CONTENT ONLY</p>

        <div class="box-wrapper" onclick="startLucky()">
            <div class="box-lid" id="lid"></div>
            <div class="box-body" id="body">
                <div class="box-ribbon-v"></div>
                <div class="vip-badge">VIP</div>
            </div>
        </div>

        <button class="open-btn" onclick="startLucky()">상자 열기</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="video-container" id="videoContainer">
            <div class="loading">콘텐츠 로딩 중...</div>
            <iframe id="videoFrame" allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        // ⚠️ 사용자님의 구글 앱스 스크립트 배포 주소로 교체하세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwYy_z8U3FmS2V-x_6U6_P2_Xz_새주소/exec";

        let isProcessing = false;

        async function startLucky() {
            if (isProcessing) return;
            isProcessing = true;

            const lid = document.getElementById('lid');
            const overlay = document.getElementById('overlay');
            const frame = document.getElementById('videoFrame');

            // 1. 상자 애니메이션
            lid.style.transform = "translateY(-100px) rotate(-20deg) scale(1.1)";
            
            try {
                // 2. GAS에서 데이터 가져오기
                const response = await fetch(GAS_URL);
                const data = await response.json();

                if (data.type === "video") {
                    // 영상인 경우: iframe에 주소 삽입
                    frame.src = data.url;
                    overlay.style.display = 'flex';
                } else if (data.type === "ad") {
                    // 광고인 경우: 쿠팡 링크로 이동
                    window.location.href = data.url;
                }
            } catch (e) {
                alert("네트워크 연결을 확인해주세요.");
                lid.style.transform = "none";
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
